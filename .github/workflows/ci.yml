name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # GitHub Actions is forcing Node 24 from June 2026; opt in now so the
  # warnings disappear and we test on the runtime the runner will use.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build + checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Unit + component tests
        run: npm run test
      - name: Astro check (types + lint)
        run: npx astro check
      - name: Build
        run: npm run build
      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  links:
    name: Link check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          # Excluded hosts:
          # - linkedin.com: aggressive crawler blocking (999/404 depending on IP)
          # - astro.build: rare but recurring 'connection reset by peer' flakes
          # All four excluded domains are stable identifiers; a build cannot
          # accidentally introduce a typo in them, so the cost of skipping is
          # near zero.
          args: >-
            --no-progress
            --accept 200,206,429
            --scheme http
            --scheme https
            --root-dir ${{ github.workspace }}/dist
            --exclude '^https?://localhost'
            --exclude '^https?://127\.0\.0\.1'
            --exclude '^https?://ilyalebe\.dev'
            --exclude '^https?://(www\.)?linkedin\.com'
            --exclude '^https?://astro\.build'
            './dist/**/*.html'
            './dist/llms.txt'
          fail: true
